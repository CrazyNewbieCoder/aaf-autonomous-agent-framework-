name: AAF Core Test # Название, которое будет светиться на GitHub

# 1. КОГДА ЗАПУСКАТЬ?
on:
  push:
    branches: [ "main" ] # Запускать при каждом git push в ветку main
  pull_request:
    branches: [ "main" ] # Запускать, если кто-то предложит код через Pull Request

# 2. ЧТО ДЕЛАТЬ?
jobs:
  test-installation:
    name: Test CLI and Docker Build
    runs-on: ubuntu-latest # Выделяем чистый сервер на Linux Ubuntu

    steps:
    # Шаг A: скрипт скачивает код из репозитория
    - name: 📥 Checkout repository
      uses: actions/checkout@v4

    # Шаг B: скрипт устанавливает голый Python 3.11
    - name: 🐍 Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # Шаг C: Имитируем действия пользователя (Создание агента)
    # ВАЖНО: aaf.py сам устанавливает PyYAML через subprocess. 
    # Этот шаг проверит, не сломалась ли эта авто-установка
    - name: 🤖 Run AAF CLI (Create Agent)
      run: |
        python aaf.py create TEST_AGENT
        
        # Проверяем, создались ли папки (если нет, роняем тест)
        if [ ! -d "Agents/TEST_AGENT" ]; then
          echo "Ошибка: Папка агента не создалась."
          exit 1
        fi

    # Шаг D: Проверяем генерацию Docker Compose
    - name: 🐳 Check Docker Compose Generation
      run: |
        # aaf.py должен был сгенерировать docker-compose.yml. Проверим, есть ли он.
        if [ ! -f "docker-compose.yml" ]; then
          echo "Ошибка: docker-compose.yml не сгенерирован."
          exit 1
        fi

    # Шаг E: Тестовая сборка Docker-образа (САМЫЙ ВАЖНЫЙ ШАГ)
    # Мы не делаем 'up -d', потому что нам не нужно запускать БД. 
    # Нам нужно проверить, что Dockerfile собирается без ошибок (все requirements.txt на месте)
    - name: 🏗️ Build Docker Image
      run: |
        docker compose build agent_test_agent