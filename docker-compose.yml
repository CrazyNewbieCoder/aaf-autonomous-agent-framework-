services:
  postgres_db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agent_core_db
      TZ: HOST-3
    volumes:
    - agent_pg_data:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U postgres -d agent_core_db
      interval: 5s
      timeout: 5s
      retries: 10
  sandbox_engine:
    image: docker:24-dind
    restart: on-failure
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ''
    command: --host=tcp://0.0.0.0:2375
    volumes:
    - ./Agents:/app/Agents
    healthcheck:
      test:
      - CMD
      - docker
      - info
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
  agent_lumi:
    build:
      context: .
      args:
        AGENT_NAME: LUMI
    depends_on:
      postgres_db:
        condition: service_healthy
      sandbox_engine:
        condition: service_healthy
    restart: on-failure
    env_file:
    - ./Agents/LUMI/.env
    environment:
    - AGENT_NAME=LUMI
    - DOCKER_HOST=tcp://sandbox_engine:2375
    - TZ=HOST-3
    networks:
      default:
        aliases:
        - agent_lumi
    volumes:
    - ./Agents/LUMI:/app/Agents/LUMI
    - ./src:/app/src
    - ./src/layer00_utils/local_models:/app/src/layer00_utils/local_models
  agent_vega:
    build:
      context: .
      args:
        AGENT_NAME: VEGA
    depends_on:
      postgres_db:
        condition: service_healthy
      sandbox_engine:
        condition: service_healthy
    restart: on-failure
    env_file:
    - ./Agents/VEGA/.env
    environment:
    - AGENT_NAME=VEGA
    - DOCKER_HOST=tcp://sandbox_engine:2375
    - TZ=HOST-3
    networks:
      default:
        aliases:
        - agent_vega
    volumes:
    - ./Agents/VEGA:/app/Agents/VEGA
    - ./src:/app/src
    - ./src/layer00_utils/local_models:/app/src/layer00_utils/local_models
volumes:
  agent_pg_data: null
